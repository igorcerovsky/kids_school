<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Adaptive I/Y Practice</title>

<style>

body {
    font-family: Arial;
    text-align: center;
    padding: 30px;
    background-color: #f5f7fb;
}

#word {
    font-size: 44px;
    margin: 30px;
    letter-spacing: 4px;
}

button.choice {
    font-size: 26px;
    padding: 12px 24px;
    margin: 10px;
    cursor: pointer;
}

#stats {
    margin-top: 20px;
    font-size: 18px;
}

#slowWords,
#wrongWords,
#speedTrend {
    margin-top: 20px;
    font-size: 16px;
}

.correctWord {
    color: green;
}

.resetBtn {
    margin-top: 20px;
    padding: 8px 16px;
}

</style>

</head>

<body>

<h1>📝 Adaptive I / Y Practice</h1>

<div id="word">loading...</div>

<div>
<button class="choice" onclick="chooseLetter('i')">i</button>
<button class="choice" onclick="chooseLetter('y')">y</button>
<button class="choice" onclick="chooseLetter('í')">í</button>
<button class="choice" onclick="chooseLetter('ý')">ý</button>
</div>

<div id="stats"></div>

<div id="slowWords"></div>
<div id="wrongWords"></div>
<div id="speedTrend"></div>

<button class="resetBtn" onclick="resetProgress()">
Reset Progress
</button>

<script>

// =====================
// STORAGE
// =====================

const STORAGE_KEY =
"iy_practice_progress_v2";

// =====================
// WORD LIST
// =====================

let words = [

"digestor","diktát","dinosaurus","dioptria","disk",
"diskutovať","dispečer","džudista",
"krokodíl","puding","disciplína",

"hymna","hygiena","hydina",
"hydrant","hyacint",
"ohýbať","mohyla",

"chyba","chýbať",
"chyža","chytiť",

"kyslík","kyslý",

"gymnastika","gymnázium",

"dyňa","dym","dýchať",

"tykadlo","tyčinka",
"týždeň",

"nylon","vinyl",

"lyko","lyže",

"plyn","mlyn",
"plyš","plytký"

];

// =====================
// VARIABLES
// =====================

let stats = {};
let wrongWords = new Set();

let correctCount = 0;
let incorrectCount = 0;

let speedSamples = [];
let recentTimes = [];

let currentWord = "";
let gapPositions = [];
let gapIndex = 0;

let startTime = 0;

// =====================
// LOAD / SAVE
// =====================

function loadProgress() {

let saved =
localStorage.getItem(STORAGE_KEY);

if (saved) {

let data =
JSON.parse(saved);

stats = data.stats;

wrongWords =
new Set(data.wrongWords);

correctCount =
data.correctCount;

incorrectCount =
data.incorrectCount;

speedSamples =
data.speedSamples || [];

recentTimes =
data.recentTimes || [];

} else {

words.forEach(w => {

stats[w] = {
totalTime: 0,
attempts: 0
};

});

}

}

function saveProgress() {

let data = {

stats: stats,

wrongWords:
[...wrongWords],

correctCount:
correctCount,

incorrectCount:
incorrectCount,

speedSamples:
speedSamples,

recentTimes:
recentTimes

};

localStorage.setItem(
STORAGE_KEY,
JSON.stringify(data)
);

}

function resetProgress() {

localStorage.removeItem(
STORAGE_KEY
);

location.reload();

}

// =====================
// WORD SELECTION
// =====================

function getSlowWords() {

return Object.entries(stats)
.sort((a,b) =>
(b[1].totalTime /
Math.max(b[1].attempts,1))
-
(a[1].totalTime /
Math.max(a[1].attempts,1))
)
.slice(0,12)
.map(x => x[0]);

}

function getRandomWord() {

let slowWords =
getSlowWords();

let pool = [...words];

slowWords.forEach(w => {

pool.push(w);
pool.push(w);

});

let word;

do {

word =
pool[Math.floor(
Math.random() * pool.length
)];

} while (!hasGap(word));

return word;

}

function hasGap(word) {

return [...word].some(
c => "iyíý".includes(c)
);

}

// =====================
// GAP CREATION
// =====================

function createGaps(word) {

gapPositions = [];

for (let i=0;i<word.length;i++) {

if ("iyíý".includes(word[i])) {

gapPositions.push(i);

}

}

gapIndex = 0;

let chars = word.split("");

gapPositions.forEach(pos => {

chars[pos] = "_";

});

return chars.join("");

}

// =====================
// SHOW WORD
// =====================

function showWord() {

currentWord =
getRandomWord();

let wordDiv =
document.getElementById("word");

wordDiv.classList.remove(
"correctWord"
);

wordDiv.textContent =
createGaps(currentWord);

speakWord();

startTime =
performance.now();

}

// =====================
// LETTER INPUT
// =====================

function chooseLetter(letter) {

let correctLetter =
currentWord[
gapPositions[gapIndex]
];

if (letter === correctLetter) {

fillLetter(letter);

gapIndex++;

if (
gapIndex ===
gapPositions.length
) {

finishWord();

}

} else {

incorrectCount++;

wrongWords.add(
currentWord
);

updateStats();
saveProgress();

}

}

function fillLetter(letter) {

let wordDiv =
document.getElementById("word");

let chars =
wordDiv.textContent.split("");

chars[
gapPositions[gapIndex]
] = letter;

wordDiv.textContent =
chars.join("");

}

// =====================
// FINISH WORD
// =====================

function finishWord() {

let endTime =
performance.now();

let time =
(endTime - startTime)/1000;

let perLetter =
time / gapPositions.length;

stats[currentWord]
.totalTime += perLetter;

stats[currentWord]
.attempts++;

recentTimes.push(perLetter);

if (recentTimes.length === 10) {

let avg =
recentTimes.reduce((a,b)=>a+b,0)
/ recentTimes.length;

speedSamples.push(avg);

if (speedSamples.length > 20) {

speedSamples.shift();

}

recentTimes = [];

}

correctCount++;

updateStats();
saveProgress();

let wordDiv =
document.getElementById("word");

wordDiv.textContent =
currentWord;

wordDiv.classList.add(
"correctWord"
);

setTimeout(
showWord,
1000
);

}

// =====================
// SPEECH
// =====================

function speakWord() {

let utterance =
new SpeechSynthesisUtterance(
currentWord
);

utterance.lang = "sk-SK";

speechSynthesis.cancel();

speechSynthesis.speak(
utterance
);

}

// =====================
// DISPLAY
// =====================

function updateStats() {

let total =
correctCount +
incorrectCount;

let accuracy =
total > 0
? (correctCount / total * 100).toFixed(1)
: 0;

document.getElementById("stats")
.textContent =
"Correct: "
+ correctCount +
" | Incorrect: "
+ incorrectCount +
" | Accuracy: "
+ accuracy + "%";

displaySlowWords();
displayWrongWords();
displaySpeedTrend();

}

function displaySlowWords() {

document.getElementById("slowWords")
.innerHTML =
"<b>12 Slowest Words:</b><br>"
+ getSlowWords().join(", ");

}

function displayWrongWords() {

document.getElementById("wrongWords")
.innerHTML =
"<b>Incorrect Words:</b><br>"
+ [...wrongWords].join(", ");

}

function displaySpeedTrend() {

document.getElementById("speedTrend")
.innerHTML =
"<b>Speed trend (sec/letter):</b><br>"
+ speedSamples
.map(v => v.toFixed(2))
.join(" → ");

}

// =====================
// START
// =====================

window.onload = () => {

loadProgress();

updateStats();

showWord();

};

</script>

</body>
</html>
