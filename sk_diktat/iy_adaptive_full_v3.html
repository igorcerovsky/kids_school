<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>I/Y Trainer</title>

<style>

body {
font-family: Arial;
text-align: center;
padding: 30px;
background: #f5f7fb;
}

#word {
font-size: 44px;
margin: 30px;
letter-spacing: 4px;
}

button.choice {
font-size: 26px;
padding: 12px 24px;
margin: 10px;
cursor: pointer;
}

.correctWord {
color: green;
}

canvas {
margin-top: 30px;
border: 1px solid #ccc;
}

#wrongWords {
max-width: 900px;
margin: auto;
line-height: 1.6;
}

#dailyHistory {
margin-top:20px;
font-size:14px;
}

</style>

</head>

<body>

<h1>I / Y Trainer</h1>

<label><b>Practice Mode:</b></label><br>

<select id="modeSelect">
<option value="normal">Normal</option>
<option value="slow">Slowest</option>
<option value="wrong">Incorrect</option>
</select>

<div id="word">loading...</div>

<div>

<button class="choice" onclick="chooseLetter('i')">i</button>
<button class="choice" onclick="chooseLetter('y')">y</button>
<button class="choice" onclick="chooseLetter('í')">í</button>
<button class="choice" onclick="chooseLetter('ý')">ý</button>

</div>

<br>

<button onclick="speakWord()">
🔊 Repeat Word
</button>

<div id="stats"></div>
<div id="slowWords"></div>
<div id="wrongWords"></div>

<canvas id="speedChart"
width="600"
height="250"></canvas>

<div id="dailyHistory"></div>

<br><br>

<button onclick="resetProgress()">
Reset Progress
</button>

<script>

// STORAGE

const STORAGE_KEY =
"iy_practice_progress_v8";

const DAILY_KEY =
"iy_daily_history";

// IDLE

let idleTimeout=null;
let idleLimit=10000;

let pauseStart=0;
let totalPausedTime=0;

// WORDS

let words=[

"digestor","diktát","dinosaurus","dioptria","disk",
"diskutovať","dispečer","džudista","Edita",
"krokodíl","puding","disciplína","dirigent",

"Martin","Tibor","tiger","tikať","tik-tak",
"tím","Timea","tip","tipovať","tip-top",
"títo","titul","Valentín",

"Bonifác","Denis","Dominik","Monika",
"tenis","tenisky","Veronika",

"klíma","klimatizácia","milimeter",
"licencia","liga","liter",
"literatúra","republika",

// NEW WORDS

"hi-hi","hijó","híkať","Hilda",
"história","historik","hit","hitparáda",

"architekt","archív","chi-chi",
"chichot","chichotať sa",
"chirurg","chirurgia",

"kibicovať","kikirikí","kilo",
"kilogram","kilometer","kimono",
"kino","kinofilm","kinosála",
"kivi","treningy","panika",

"angína","Brigita","gigabajt",
"gigant","girlanda","gitara",
"gitovať","Gizela","legíny",
"logika","Margita","Regina",
"gibon",
"hymna",
"hyj?",
"hygiena",
"hydina",
"hýbať sa",
"hydrant",
"hyacint",
"ohýbať",
"mohyla",
"pohyb",

"chytro",
"chyba",
"chýbať",
"chýr",
"chyža",
"chytiť",
"chýl",
"pochybovať",

"kýchnuť",
"kyslé",
"kyslý",
"kyslík",
"kysnuté",
"zakývať",
"kývadlo",
"kypí",

"gymnastika",
"gymnázium",

"dyňa",
"dym",
"dýchať",
"oddych",
"dýka",
"dýchovka",
"Londýn",

"dotyk",
"tykadlo",
"tykať niekomu",
"týrajú",
"tyč",
"tyčinka",
"motýľ",
"týždeň",
"tyrkysový",
"kostým",

"nylon",
"synonymá",
"vinyl",
"nymfa",

"lyko",
"lykožrút",
"lyže",

// EXTRA WORDS  

"lysý",
"lýtko",
"lyžica",
"blýskať sa",
"blyšťať sa",
"mlyn",
"plyn",
"plyš",
"plytký",
"sýchať",
"vzlykať",
"lyže",
"pomaly",
"vplyv",
"splývať",
"zlyhať",
"plynúť",

"bicykel",
"cyklista",
"encyklopédia",
"cylinder",
"Cyril",

"sanitka",
"policajt",

"linajka",

"diplom",

"chichi"

];

// VARIABLES

let stats={};
let wrongMap={};

let correctCount=0;
let incorrectCount=0;

let speedSamples=[];
let recentTimes=[];

let currentWord="";
let gapPositions=[];
let gapIndex=0;

let startTime=0;

// LOAD

function loadProgress(){

let saved=
localStorage.getItem(STORAGE_KEY);

if(saved){

let data=
JSON.parse(saved);

stats=data.stats;
wrongMap=data.wrongMap||{};

correctCount=data.correctCount;
incorrectCount=data.incorrectCount;

speedSamples=data.speedSamples||[];

recentTimes=data.recentTimes||[];

}

else{

words.forEach(w=>{

stats[w]={
totalTime:0,
attempts:0
};

});

}

}

// SAVE

function saveProgress(){

let data={

stats:stats,
wrongMap:wrongMap,

correctCount:correctCount,
incorrectCount:incorrectCount,

speedSamples:speedSamples,
recentTimes:recentTimes

};

localStorage.setItem(
STORAGE_KEY,
JSON.stringify(data)
);

}

// DAILY HISTORY

function saveDailyHistory(){

let today=
new Date()
.toISOString()
.slice(0,10);

let history=
JSON.parse(
localStorage.getItem(DAILY_KEY)
|| "{}"
);

let total=
correctCount+
incorrectCount;

let accuracy=
total>0
?(correctCount/total*100).toFixed(1)
:0;

let avgSpeed=
speedSamples.length>0
?(speedSamples.reduce((a,b)=>a+b,0)
/ speedSamples.length)
.toFixed(2)
:"-";

history[today]={
accuracy:accuracy,
speed:avgSpeed
};

localStorage.setItem(
DAILY_KEY,
JSON.stringify(history)
);

displayDailyHistory();

}

// DISPLAY DAILY

function displayDailyHistory(){

let history=
JSON.parse(
localStorage.getItem(DAILY_KEY)
|| "{}"
);

let lines=[];

for(let date in history){

let h=history[date];

lines.push(
date+
" Accuracy: "+
h.accuracy+
"% Speed: "+
h.speed+
" s/letter"
);

}

document.getElementById(
"dailyHistory"
).innerHTML=
"<b>Daily History:</b><br>"
+lines.join("<br>");

}

// RESET

function resetProgress(){

localStorage.clear();
location.reload();

}

// IDLE TIMER

function resetIdleTimer(){

clearTimeout(idleTimeout);

idleTimeout=
setTimeout(handleIdle,idleLimit);

}

function handleIdle(){

pauseStart=
performance.now();

speakWord();

}

// TAB SWITCH HANDLING

document.addEventListener(
"visibilitychange",
()=>{

if(document.hidden){

pauseStart=
performance.now();

}

else{

if(pauseStart!==0){

totalPausedTime+=
performance.now()
-pauseStart;

pauseStart=0;

}

}

});

// CREATE GAPS

function createGaps(word){

gapPositions=[];

for(let i=0;i<word.length;i++){

if("iyíý".includes(word[i])){

gapPositions.push(i);

}

}

gapIndex=0;

let chars=word.split("");

gapPositions.forEach(pos=>{

chars[pos]="_";

});

return chars.join("");

}

// SHOW WORD

function showWord(){

currentWord=
words[
Math.floor(
Math.random()*words.length
)
];

let wordDiv=
document.getElementById("word");

wordDiv.classList.remove(
"correctWord"
);

wordDiv.textContent=
createGaps(currentWord);

speakWord();

startTime=
performance.now();

totalPausedTime=0;

resetIdleTimer();

}

// INPUT

function chooseLetter(letter){

resetIdleTimer();

// Resume pause if needed

if(pauseStart!==0){

totalPausedTime+=
performance.now()
-pauseStart;

pauseStart=0;

}

let correctLetter=
currentWord[
gapPositions[gapIndex]
];

if(letter===correctLetter){

fillLetter(letter);

gapIndex++;

if(
gapIndex===
gapPositions.length
){

finishWord();

}

}

else{

incorrectCount++;

logWrongLetter(letter);

updateStats();
saveProgress();

}

}

// WRONG LETTER TRACK

function logWrongLetter(letter){

let pos=
gapPositions[gapIndex];

if(!wrongMap[currentWord]){

wrongMap[currentWord]={};

}

if(!wrongMap[currentWord][pos]){

wrongMap[currentWord][pos]=[];

}

wrongMap[currentWord][pos]
.push(letter);

}

// FILL LETTER

function fillLetter(letter){

let wordDiv=
document.getElementById("word");

let chars=
wordDiv.textContent.split("");

chars[
gapPositions[gapIndex]
]=letter;

wordDiv.textContent=
chars.join("");

}

// FINISH WORD

function finishWord(){

let endTime=
performance.now();

let time=
(
endTime
-startTime
-totalPausedTime
)/1000;

let perLetter=
time/gapPositions.length;

// OUTLIER FILTER

if(
perLetter>5||
perLetter<0.05
){

console.log("Outlier skipped");

correctCount++;

setTimeout(
showWord,
1000
);

return;

}

recentTimes.push(perLetter);

correctCount++;

updateStats();
saveProgress();
saveDailyHistory();

let wordDiv=
document.getElementById("word");

wordDiv.textContent=
currentWord;

wordDiv.classList.add(
"correctWord"
);

setTimeout(
showWord,
1000
);

}

// SPEECH

function speakWord(){

let utterance=
new SpeechSynthesisUtterance(
currentWord
);

utterance.lang="sk-SK";

speechSynthesis.cancel();

speechSynthesis.speak(
utterance
);

}

// WRONG WORD DISPLAY

function displayWrongWords(){

let list=[];

for(let word in wrongMap){

let positions=
wrongMap[word];

let result="";

for(let i=0;i<word.length;i++){

let letter=word[i];

if(positions[i]){

let wrongs=
positions[i].join(",");

result+=
"<span style='color:green'>"
+letter+
"</span>"
+"(<span style='color:red'>"
+wrongs+
"</span>)";

}

else{

result+=letter;

}

}

list.push(result);

}

document.getElementById("wrongWords")
.innerHTML=
"<b>Incorrect Words:</b><br>"
+list.join(", ");

}

// STATS

function updateStats(){

let total=
correctCount+
incorrectCount;

let accuracy=
total>0
?(correctCount/total*100).toFixed(1)
:0;

document.getElementById("stats")
.textContent=
"Correct: "
+correctCount+
" | Incorrect: "
+incorrectCount+
" | Accuracy: "
+accuracy+"%";

displayWrongWords();

}

// START

window.onload=()=>{

loadProgress();
displayDailyHistory();
showWord();

};

</script>

</body>
</html>
