<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math Trainer</title>

<style>

body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f8ff;
    margin: 0;
    padding: 10px;
}

h1 { font-size: 6vw; }

.problem {
    font-size: 12vw;
    margin: 20px 0;
}

/* TEXT INPUT — no spin buttons */

input[type=text] {

    font-size: 8vw;
    width: 40vw;
    padding: 10px;
    text-align: center;

}

/* numeric keyboard on mobile */

input[inputmode="numeric"] {
    ime-mode: disabled;
}

button {

    font-size: 5vw;
    padding: 10px 20px;
    margin: 5px;

}

.correct { color: green; }
.wrong { color: red; }

.panel {

    margin-top: 15px;
    font-size: 4.5vw;

}

.review-section {

    margin-top: 30px;
    text-align: left;

}

.review-box {

    background: white;
    padding: 10px;
    border-radius: 10px;
    margin-top: 5px;
    word-wrap: break-word;

}

.mode-box {

    margin-top: 10px;

}

.range-box {

    margin-top: 5px;

}

.range-box input {

    width: 60px;
    font-size: 16px;

}

@media (min-width: 600px) {

    h1 { font-size: 32px; }
    .problem { font-size: 50px; }
    input { font-size: 28px; width: 150px; }
    button { font-size: 18px; }
    .panel { font-size: 18px; }

}

</style>

</head>

<body>

<h1>Math Trainer ✏️</h1>

<!-- MODES -->

<div class="mode-box">

<label>
<input type="checkbox" id="modeMul" checked>
✖ Multiplication
</label>

<div class="range-box">
Range:
<input type="number" id="mulMin" value="1">
to
<input type="number" id="mulMax" value="10">
</div>

<label>
<input type="checkbox" id="modeAdd">
➕ Addition
</label>

<div class="range-box">
Range:
<input type="number" id="addMin" value="1">
to
<input type="number" id="addMax" value="20">
</div>

<label>
<input type="checkbox" id="modeSub">
➖ Subtraction
</label>

<div class="range-box">
Range:
<input type="number" id="subMin" value="1">
to
<input type="number" id="subMax" value="20">
</div>

<label>
<input type="checkbox" id="modeDiv">
➗ Division
</label>

<div class="range-box">
Range:
<input type="number" id="divMin" value="1">
to
<input type="number" id="divMax" value="10">
</div>

</div>

<!-- PROBLEM -->

<div class="problem" id="problem">
Press Start
</div>

<input
type="text"
id="answer"
inputmode="numeric"
autocomplete="off"
>

<br>

<button onclick="startResume()">▶️ Start</button>
<button onclick="pause()">⏸ Pause</button>
<button onclick="resetStats()">🧹 Reset</button>

<div id="feedback"></div>

<div class="panel">
⏱ Time:
<span id="timer">0.0</span>s
</div>

<div class="panel">
✅ Correct:
<span id="correctCount">0</span>

|

❌ Wrong:
<span id="wrongCount">0</span>
</div>

<div class="review-section">

<div><b>❌ Latest Wrong:</b></div>
<div class="review-box" id="wrongList"></div>

<div><b>🐢 Slowest Problems:</b></div>
<div class="review-box" id="slowList"></div>

</div>

<script>

// CONSTANTS

const OUTLIER_MIN = 0.3;
const OUTLIER_MAX = 20;
const SLOW_THRESHOLD = 4;
const MAX_LIST = 12;

const STORAGE_KEY = "mathTrainerData";


// STATE

let num1, num2;
let operator;
let correctAnswer;

let correctCount = 0;
let wrongCount = 0;

let startTime;
let timerInterval;

let paused = true;

let problemStats = {};
let wrongHistory = [];
let slowHistory = [];


// ELEMENTS

const problemEl = document.getElementById("problem");
const answerEl = document.getElementById("answer");
const feedbackEl = document.getElementById("feedback");

const correctEl =
    document.getElementById("correctCount");

const wrongEl =
    document.getElementById("wrongCount");

const wrongListEl =
    document.getElementById("wrongList");

const slowListEl =
    document.getElementById("slowList");

const timerEl =
    document.getElementById("timer");


// ENTER KEY FIX — Firefox safe

answerEl.addEventListener(
"keydown",
function(e) {

    if (e.key === "Enter") {

        e.preventDefault();
        checkAnswer();

    }

});


// STORAGE

function saveData() {

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({
            correctCount,
            wrongCount,
            problemStats,
            wrongHistory,
            slowHistory
        })
    );

}

function loadData() {

    let saved =
        localStorage.getItem(STORAGE_KEY);

    if (saved) {

        let data = JSON.parse(saved);

        correctCount = data.correctCount || 0;
        wrongCount = data.wrongCount || 0;
        problemStats = data.problemStats || {};
        wrongHistory = data.wrongHistory || [];
        slowHistory = data.slowHistory || [];

        updateLists();

        correctEl.innerText = correctCount;
        wrongEl.innerText = wrongCount;

    }

}


// RANDOM

function rand(min,max) {

    return Math.floor(
        Math.random()*(max-min+1)
    )+min;

}


// MODES

function getSelectedModes() {

    let modes=[];

    if (modeMul.checked) modes.push("×");
    if (modeAdd.checked) modes.push("+");
    if (modeSub.checked) modes.push("-");
    if (modeDiv.checked) modes.push("÷");

    if (modes.length===0)
        modes.push("×");

    return modes;

}


// PROBLEM GENERATION

function chooseProblem() {

    let modes=getSelectedModes();

    let op=
        modes[
            Math.floor(Math.random()*modes.length)
        ];

    let a,b,answer;

    if (op==="×") {

        let min=+mulMin.value;
        let max=+mulMax.value;

        a=rand(min,max);
        b=rand(min,max);

        answer=a*b;

    }

    if (op==="+") {

        let min=+addMin.value;
        let max=+addMax.value;

        a=rand(min,max);
        b=rand(min,max);

        answer=a+b;

    }

    if (op==="-") {

        let min=+subMin.value;
        let max=+subMax.value;

        a=rand(min,max);
        b=rand(min,a);

        answer=a-b;

    }

    if (op==="÷") {

        let min=+divMin.value;
        let max=+divMax.value;

        b=rand(min,max);
        answer=rand(min,max);

        a=b*answer;

    }

    return {a,b,op,answer};

}


// TIMER

function startTimer() {

    startTime=Date.now();

    timerInterval=setInterval(()=>{

        let t=(Date.now()-startTime)/1000;

        timerEl.innerText=t.toFixed(1);

    },100);

}

function stopTimer() {

    clearInterval(timerInterval);

    return (Date.now()-startTime)/1000;

}


// LISTS

function addWrong(problem) {

    wrongHistory.unshift(problem);

    if (wrongHistory.length>MAX_LIST)
        wrongHistory.pop();

}

function addSlow(problem,time) {

    slowHistory.push({
        problem,
        time
    });

    slowHistory.sort(
        (a,b)=>b.time-a.time
    );

    slowHistory=
        slowHistory.slice(0,MAX_LIST);

}

function updateLists() {

    wrongListEl.innerText =
        wrongHistory.map(p=>p+";").join(" ");

    slowListEl.innerText =
        slowHistory
        .map(x =>
            x.problem+
            "("+
            x.time.toFixed(1)+
            "s);"
        )
        .join(" ");

}


// CONTROL

function startResume() {

    if (!paused) return;

    paused=false;

    newProblem();

}

function pause() {

    paused=true;

    clearInterval(timerInterval);

    problemEl.innerText="Paused";

}

function resetStats() {

    if (!confirm("Reset all data?"))
        return;

    localStorage.removeItem(STORAGE_KEY);
    location.reload();

}


// MAIN FLOW

function newProblem() {

    if (paused) return;

    let p=chooseProblem();

    num1=p.a;
    num2=p.b;
    operator=p.op;
    correctAnswer=p.answer;

    problemEl.innerText =
        num1+" "+operator+" "+num2+" =";

    answerEl.value="";
    answerEl.focus();

    startTimer();

}


function checkAnswer() {

    if (paused) return;

    let user=parseInt(answerEl.value);

    if (isNaN(user))
        return;

    let key =
        num1+operator+num2;

    if (!problemStats[key]) {

        problemStats[key]={
            wrong:0,
            times:[]
        };

    }

    if (user===correctAnswer) {

        let elapsed=stopTimer();

        if (
            elapsed>=OUTLIER_MIN &&
            elapsed<=OUTLIER_MAX
        ) {

            problemStats[key].times.push(elapsed);

            if (elapsed>SLOW_THRESHOLD) {

                addSlow(
                    key,
                    elapsed
                );

            }

        }

        correctCount++;

        feedbackEl.innerText="Correct! 🎉";
        feedbackEl.className="correct";

        correctEl.innerText=correctCount;

        updateLists();
        saveData();

        setTimeout(newProblem,800);

    }

    else {

        wrongCount++;

        problemStats[key].wrong++;

        addWrong(key);

        feedbackEl.innerText="Try again ❌";
        feedbackEl.className="wrong";

        wrongEl.innerText=wrongCount;

        updateLists();
        saveData();

        answerEl.value="";

    }

}


// INIT

loadData();

</script>

</body>
</html>
